server:
  port: 8013

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/biaofan?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

  mail:
    host: smtp.qq.com
    port: 587
    username: 
    password: 
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  servlet:
    multipart:
      location: /www/sop-uploads
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  # C-03: JWT secret 通过环境变量注入，避免硬编码
  secret: ${JWT_SECRET:biaofan-sop-platform-secret-key-2026-very-long-and-secure}
  ttl: 86400000
