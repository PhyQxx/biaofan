server:
  port: 8013

spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/biaofan?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

  servlet:
    multipart:
      location: /www/sop-uploads
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  # C-03: JWT secret 通过环境变量注入，避免硬编码
  secret: ${JWT_SECRET:default-dev-secret-key-at-least-32-chars}
  ttl: 86400000

ai:
  model:
    connect-timeout-ms: 10000
    read-timeout-ms: 60000

logging:
  level:
    com.biaofan: INFO
    com.baomidou.mybatisplus: WARN
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
