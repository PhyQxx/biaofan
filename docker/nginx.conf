server {
    listen 8011;
    server_name _;

    # Security headers
    server_tokens off;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # API proxy to backend
    location /api/ {
        proxy_pass http://biaofan-backend:8013/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads (served from backend volume or shared)
    location /uploads/ {
        proxy_pass http://biaofan-backend:8013/uploads/;
    }

    # Mobile H5 (UniApp build)
    location /mobile/ {
        alias /usr/share/nginx/mobile/;
        try_files $uri $uri/ /mobile/index.html;
    }

    # Vue Router HTML5 history mode
    location / {
        try_files $uri $uri/ /index.html;
    }
}
