version: '3.8'

services:
  biaofan-backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: biaofan-backend
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "java -jar app.jar"]
      interval: 30s
      timeout: 10s
      retries: 3

  biaofan-frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: biaofan-frontend
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011"]
      interval: 30s
      timeout: 10s
      retries: 3
